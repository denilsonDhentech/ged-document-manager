name: Java CI with Maven and Docker

on:
  push:
    branches: [ "main", "feature/**" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest


    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: ged_db_test
          POSTGRES_USER: administratorTest
          POSTGRES_PASSWORD: admin123Test
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Start MinIO Storage
        run: docker compose up -d minio createbuckets

      - name: Build and Test with Maven
        run: ./mvnw test -Ptest